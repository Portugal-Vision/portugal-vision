<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Box | Portugal Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        #slider { width: 100%; height: 100%; position: relative; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1.5s ease-in-out; display: flex; align-items: center; justify-content: center; }
        .slide.active { opacity: 1; }
        img { width: 100%; height: 100%; object-fit: cover; }
        
        .overlay { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(transparent, rgba(0,0,0,0.9)); 
            color: white; padding: 60px 40px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .overlay h1 { font-size: 4em; margin: 0; text-transform: uppercase; }
        .overlay h2 { font-size: 3em; color: #38bdf8; margin: 10px 0; }
        .overlay p { font-size: 1.5em; opacity: 0.8; margin: 0; }

        /* Badge de Desconto na Digital Box */
        .promo-badge {
            position: absolute; top: 40px; right: 40px;
            background: #e63946; color: white;
            padding: 20px 30px; border-radius: 50px;
            font-size: 2em; font-weight: 800;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="slider"></div>

    <script>
        const _sb = supabase.createClient("https://hhrmbrcaujfsqfanxqqq.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhocm1icmNhdWpmc3FmYW54cXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTA0NDIsImV4cCI6MjA4ODcyNjQ0Mn0.pPkvwcb4h8SjYyvAFt1dnJE6Xn8KDQ4TVcy-QiamLpk");
        let currentIndex = 0;
        let slides = [];

        async function carregarDigitalBox() {
            // 1. Pega o slug da loja na URL (ex: digital_box.html?loja=cafe-santos)
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('loja');
            if (!slug) return;

            // 2. Busca a loja para ter o ID e o Nome
            const { data: loja } = await _sb.from('lojas').select('*').eq('slug', slug).single();
            
            if (loja) {
                // 3. Busca apenas os produtos dessa loja que não estão ocultos
                const { data: produtos } = await _sb.from('produtos')
                    .select('*')
                    .eq('loja_id', loja.id)
                    .eq('oculto', false)
                    .order('created_at', {ascending: false});

                if (!produtos || produtos.length === 0) return;

                const slider = document.getElementById('slider');
                slider.innerHTML = produtos.map((p, i) => {
                    const preco = parseFloat(p.preco) || 0;
                    const desc = parseInt(p.desconto_percent) || 0;
                    const final = desc > 0 ? (preco * (1 - desc / 100)).toFixed(2) : preco.toFixed(2);

                    return `
                        <div class="slide ${i === 0 ? 'active' : ''}">
                            <img src="${p.imagem_url || ''}" onerror="this.src='https://via.placeholder.com/1920x1080?text=Portugal+Vision'">
                            ${desc > 0 ? `<div class="promo-badge">-${desc}%</div>` : ''}
                            <div class="overlay">
                                <p>${loja.nome}</p>
                                <h1>${p.nome}</h1>
                                <h2>${final}€ ${desc > 0 ? `<span style="font-size:0.5em; text-decoration:line-through; opacity:0.6;">${preco.toFixed(2)}€</span>` : ''}</h2>
                            </div>
                        </div>
                    `;
                }).join('');

                iniciarAnimacao();
            }
        }

        function iniciarAnimacao() {
            const slidesElements = document.querySelectorAll('.slide');
            if (slidesElements.length <= 1) return;

            setInterval(() => {
                slidesElements[currentIndex].classList.remove('active');
                currentIndex = (currentIndex + 1) % slidesElements.length;
                slidesElements[currentIndex].classList.add('active');
            }, 6000); // Troca a cada 6 segundos
        }

        carregarDigitalBox();
    </script>
</body>
</html>

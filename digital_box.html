<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Montra Digital | Portugal Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; cursor: pointer; }
        
        #slider { width: 100%; height: 100%; position: relative; }

        .slide { 
            position: absolute; inset: 0; opacity: 0; 
            transition: opacity 2.5s ease-in-out; /* Transição ainda mais suave entre fotos */
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .slide.active { opacity: 1; z-index: 10; }

        .slide img.fg-img { 
            position: absolute;
            width: 100%; height: 100%; 
            object-fit: cover; object-position: center;
            transform: scale(1);
            transition: transform 12s linear; 
            z-index: 1;
        }

        /* Efeito Ken Burns Extra-Subtil (Toque de Luxo) */
        .slide.active img.fg-img { transform: scale(1.03) translateX(5px); }

        .overlay { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(transparent, rgba(0,0,0,0.85) 70%, rgba(0,0,0,0.95) 100%); 
            color: white; padding: 120px 60px 140px;
            z-index: 20;
            transform: translateY(20px);
            transition: transform 2s ease-out;
            display: flex; justify-content: space-between; align-items: flex-end;
        }

        .slide.active .overlay { transform: translateY(0); }

        .text-content { flex: 1; }

        /* Ajustes no Nome do Produto com Tipografia Premium */
        .overlay p { font-family: 'Inter', sans-serif; font-size: 1.2em; opacity: 0.7; margin: 0 0 10px 0; font-weight: 400; letter-spacing: 4px; text-transform: uppercase; }
        .overlay h1 { font-family: 'Playfair Display', serif; font-size: 4em; margin: 0 0 15px 0; font-weight: 600; line-height: 1.1; letter-spacing: -1px; }
        
        .price-row { display: flex; align-items: baseline; gap: 20px; }
        .overlay h2 { font-family: 'Playfair Display', serif; font-size: 3em; color: #eab308; /* Dourado suave */ margin: 0; font-weight: 600; }
        .old-price { font-family: 'Inter', sans-serif; font-size: 1.2em; text-decoration: line-through; opacity: 0.5; font-weight: 300; }
        
        .promo-tag {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: white;
            padding: 8px 15px; border-radius: 8px;
            font-family: 'Inter', sans-serif; font-size: 1.2em; font-weight: 600;
            backdrop-filter: blur(5px);
        }

        /* NOVO: Estilos do QR Code Super Minimalista */
        #qr-code-container {
            position: absolute; bottom: 90px; right: 60px;
            background: rgba(255, 255, 255, 0.15); /* Fundo levíssimo */
            backdrop-filter: blur(10px);
            padding: 15px; border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 30; display: none; /* Controlado via JS */
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            /* Sem animações de flutuação, a elegância reside na estática */
        }

        #qr-code-container img {
            width: 130px; height: 130px; display: block;
            border-radius: 8px; mix-blend-mode: normal; /* Garante leitura perfeita da câmara */
            background: white; padding: 5px;
        }

        .legal-footer {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: rgba(255, 255, 255, 0.3);
            padding: 15px 60px;
            font-size: 0.75em;
            font-family: 'Inter', sans-serif;
            z-index: 100;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 0.5px;
        }

        /* Mensagem de Erro/Bloqueio */
        #error-msg {
            color: white; text-align: center; padding-top: 20%; font-size: 2em; display: none; font-family: 'Playfair Display', serif;
        }
        #error-msg p { font-family: 'Inter', sans-serif; font-size: 0.5em; opacity: 0.7; font-weight: 300; }
    </style>
</head>
<body>
    <div id="slider"></div>
    <div id="error-msg"><h1>Montra Indisponível</h1><p>Contacte o administrador da plataforma.</p></div>

    <!-- INJEÇÃO DO QR CODE MINIMALISTA -->
    <div id="qr-code-container">
        <img id="qr-code-img" src="" alt="QR Code">
    </div>

    <div class="legal-footer">
        As imagens, descrições e preços apresentados são da inteira responsabilidade do anunciante. 
        A plataforma <b>Portugal Vision</b> não se responsabiliza por este conteúdo.
    </div>

    <script>
        // Configuração Supabase
        const _sb = supabase.createClient("https://hhrmbrcaujfsqfanxqqq.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhocm1icmNhdWpmc3FmYW54cXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTA0NDIsImV4cCI6MjA4ODcyNjQ0Mn0.pPkvwcb4h8SjYyvAFt1dnJE6Xn8KDQ4TVcy-QiamLpk");
        let currentIndex = 0;
        let lastDataHash = "";
        let slideTimer = null;

        // Ativar Fullscreen no clique
        document.body.addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e => console.log(e));
        });

        async function updateDigitalBox() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('loja');
            if (!slug) return;

            // Gera o QR Code dinamicamente com o link absoluto correto
            const orderLink = `https://portugal-vision.github.io/portugal-vision/website_digital.html?loja=${slug}`;
            document.getElementById('qr-code-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(orderLink)}&margin=10`;

            // Busca dados da loja e status
            const { data: loja, error: errorLoja } = await _sb.from('lojas').select('*').eq('slug', slug).single();
            
            // VERIFICAÇÃO DE SEGURANÇA
            if (!loja || loja.status !== 'ativa' || !loja.status_digital_box) {
                document.getElementById('slider').style.display = 'none';
                document.getElementById('qr-code-container').style.display = 'none';
                document.getElementById('error-msg').style.display = 'block';
                return;
            } else {
                document.getElementById('slider').style.display = 'block';
                document.getElementById('qr-code-container').style.display = 'block'; 
                document.getElementById('error-msg').style.display = 'none';
            }

            // Busca produtos
            const { data: produtos } = await _sb.from('produtos')
                .select('*')
                .eq('loja_id', loja.id)
                .eq('oculto', false);

            if (!produtos || produtos.length === 0) return;

            // Só atualiza o DOM se houver mudanças nos dados
            const currentDataHash = JSON.stringify(produtos);
            if (currentDataHash !== lastDataHash) {
                lastDataHash = currentDataHash;
                renderSlides(produtos, loja.nome);
            }
        }

        function renderSlides(produtos, nomeLoja) {
            const slider = document.getElementById('slider');
            const totalProdutos = produtos.length;
            
            // Mantém o index se possível
            if (currentIndex >= totalProdutos) currentIndex = 0;

            slider.innerHTML = produtos.map((p, i) => {
                const preco = parseFloat(p.preco) || 0;
                const desc = parseInt(p.desconto_percent) || 0;
                const final = desc > 0 ? (preco * (1 - desc / 100)).toFixed(2) : preco.toFixed(2);
                
                const imgSrc = p.imagem_url || 'https://via.placeholder.com/1920x1080?text=Portugal+Vision';

                return `
                    <div class="slide ${i === currentIndex ? 'active' : ''}">
                        <img class="fg-img" src="${imgSrc}" onerror="this.src='https://via.placeholder.com/1920x1080?text=Portugal+Vision'">
                        
                        <div class="overlay">
                            <div class="text-content">
                                <p>${nomeLoja}</p>
                                <h1>${p.nome}</h1>
                                <div class="price-row">
                                    <h2>${final}€</h2>
                                    ${desc > 0 ? `<span class="old-price">${preco.toFixed(2)}€</span> <span class="promo-tag">-${desc}%</span>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function nextSlide() {
            const slides = document.querySelectorAll('.slide');
            if (slides.length > 1) {
                slides[currentIndex].classList.remove('active');
                currentIndex = (currentIndex + 1) % slides.length;
                slides[currentIndex].classList.add('active');
            }
        }

        // Inicialização
        updateDigitalBox();

        // Ciclo de transição de slides (8 segundos)
        setInterval(nextSlide, 8000);

        // Ciclo de verificação de novos dados (30 segundos)
        setInterval(updateDigitalBox, 30000);
    </script>
</body>
</html>

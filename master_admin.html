<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control | Portugal Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #f8fafc; --panel-bg: #ffffff; --primary: #0f172a; 
            --accent: #3b82f6; --text-main: #1e293b; --text-muted: #64748b;
            --border: #e2e8f0; --success: #10b981; --danger: #ef4444;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; }
        
        /* Ecrã de Login */
        #login-screen { 
            position: fixed; inset: 0; background: var(--primary); 
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .login-box { 
            background: white; padding: 2.5rem; border-radius: 20px; width: 100%; max-width: 380px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center;
        }
        .login-box input { 
            width: 100%; padding: 0.9rem; margin-bottom: 1rem; border-radius: 10px; 
            border: 1px solid var(--border); box-sizing: border-box; outline: none;
        }
        .login-box input:focus { border-color: var(--accent); }
        .btn-auth { 
            width: 100%; padding: 1rem; background: var(--accent); color: white; 
            border: none; border-radius: 10px; font-weight: 700; cursor: pointer;
        }

        /* Painel (Oculto por padrão) */
        #main-panel { display: none; }
        .top-nav { background: var(--primary); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1440px; margin: 2rem auto; padding: 0 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--panel-bg); padding: 1.5rem; border-radius: 16px; border: 1px solid var(--border); display: flex; align-items: center; gap: 1rem; }
        .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .blue { background: #eff6ff; color: #3b82f6; } .green { background: #ecfdf5; color: #10b981; }
        
        .main-layout { display: grid; grid-template-columns: 2.8fr 1.2fr; gap: 1.5rem; }
        .card-panel { background: var(--panel-bg); padding: 1.5rem; border-radius: 16px; border: 1px solid var(--border); }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 1rem; border-bottom: 2px solid var(--border); color: var(--text-muted); font-size: 0.75rem; }
        td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        
        .badge { padding: 6px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 600; cursor: pointer; border: none; }
        .badge-active { background: #dcfce7; color: #166534; } .badge-off { background: #f1f5f9; color: #475569; }
        .btn-action { border: none; background: #f1f5f9; cursor: pointer; width: 32px; height: 32px; border-radius: 8px; }
        .btn-action:hover { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div style="font-size: 2.5rem; margin-bottom: 1rem;">🛡️</div>
        <h2 style="margin:0 0 10px 0;">Portugal Vision</h2>
        <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Acesso Administrativo</p>
        <input type="email" id="email" placeholder="Email de Admin">
        <input type="password" id="pass" placeholder="Palavra-passe">
        <button onclick="handleLogin()" id="login-btn" class="btn-auth">Entrar no Sistema</button>
        <p id="error-msg" style="color:var(--danger); font-size:0.8rem; margin-top:15px; display:none;"></p>
    </div>
</div>

<div id="main-panel">
    <nav class="top-nav">
        <div style="font-weight: 800; letter-spacing: 1px;">PORTUGAL VISION | MASTER</div>
        <div style="display: flex; gap: 10px;">
            <button onclick="handleLogout()" style="background:transparent; color:white; border:1px solid rgba(255,255,255,0.2); padding:8px 15px; border-radius:8px; cursor:pointer;">Sair</button>
            <button onclick="carregarDados()" style="background:var(--accent); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;"><i class="fas fa-sync"></i> Atualizar</button>
        </div>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-store"></i></div><div><h3>Lojas</h3><p id="stat-total">0</p></div></div>
            <div class="stat-card"><div class="stat-icon green"><i class="fas fa-eye"></i></div><div><h3>Views</h3><p id="stat-views">0</p></div></div>
        </div>

        <div class="main-layout">
            <div class="card-panel">
                <input type="text" id="search" placeholder="Pesquisar loja..." onkeyup="filtrarLojas()" style="width:100%; padding:12px; margin-bottom:1.5rem; border-radius:10px; border:1px solid var(--border); box-sizing:border-box;">
                <table>
                    <thead><tr><th>Loja</th><th>Módulos</th><th>Estado</th><th style="text-align:right">Ações</th></tr></thead>
                    <tbody id="lista-lojas"></tbody>
                </table>
            </div>
            <div class="card-panel">
                <h3 style="font-size: 0.9rem; margin-bottom: 1rem;"><i class="fas fa-history"></i> Logs Recentes</h3>
                <ul id="log-container" style="list-style:none; padding:0; font-size:0.75rem;"></ul>
            </div>
        </div>
    </div>
</div>

<script>
    const SB_URL = "https://hhrmbrcaujfsqfanxqqq.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhocm1icmNhdWpmc3FmYW54cXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTA0NDIsImV4cCI6MjA4ODcyNjQ0Mn0.pPkvwcb4h8SjYyvAFt1dnJE6Xn8KDQ4TVcy-QiamLpk";
    const _sb = supabase.createClient(SB_URL, SB_KEY);

    let todasAsLojas = [];

    // Verificação de Sessão (Profissional: se já logou, entra direto)
    async function init() {
        const { data: { session } } = await _sb.auth.getSession();
        if (session) {
            showPanel();
        }
    }

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;
        const btn = document.getElementById('login-btn');
        const err = document.getElementById('error-msg');

        btn.innerText = "A autenticar...";
        const { error } = await _sb.auth.signInWithPassword({ email, password });

        if (error) {
            err.innerText = "Falha no login: " + error.message;
            err.style.display = "block";
            btn.innerText = "Entrar no Sistema";
        } else {
            showPanel();
        }
    }

    function showPanel() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-panel').style.display = 'block';
        carregarDados();
    }

    async function handleLogout() {
        await _sb.auth.signOut();
        window.location.reload();
    }

    async function carregarDados() {
        const { data, error } = await _sb.from('lojas').select('*').order('created_at', {ascending: false});
        if (error) {
            alert("Erro de permissão: " + error.message);
            return;
        }
        todasAsLojas = data;
        renderizar(data);
    }

    function renderizar(lista) {
        document.getElementById('lista-lojas').innerHTML = lista.map(l => `
            <tr>
                <td><b>${l.nome}</b><br><small>@${l.slug}</small></td>
                <td>
                    <button class="badge ${l.status_catalogo ? 'badge-active' : 'badge-off'}" onclick="toggle(${l.id}, 'status_catalogo', ${l.status_catalogo})">Catálogo</button>
                </td>
                <td>${l.status}</td>
                <td style="text-align:right">
                    <button class="btn-action" onclick="apagarLoja(${l.id})"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    async function toggle(id, campo, valor) {
        const { error } = await _sb.from('lojas').update({ [campo]: !valor }).eq('id', id);
        if (error) alert(error.message);
        else carregarDados();
    }

    async function apagarLoja(id) {
        if(confirm("Eliminar loja?")) {
            const { error } = await _sb.from('lojas').delete().eq('id', id);
            if (error) alert(error.message);
            else carregarDados();
        }
    }

    init();
</script>
</body>
</html>

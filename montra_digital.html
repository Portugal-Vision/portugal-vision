<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Montra Digital | Portugal Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; cursor: pointer; }
        
        #slider { width: 100%; height: 100%; position: relative; z-index: 10; }

        .slide { 
            position: absolute; inset: 0; opacity: 0; 
            transition: opacity 2.5s ease-in-out; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .slide.active { opacity: 1; z-index: 15; }

        .slide img.fg-img { 
            position: absolute;
            width: 100%; height: 100%; 
            object-fit: cover; object-position: center;
            transform: scale(1);
            transition: transform 12s linear; 
            z-index: 1;
        }

        .slide.active img.fg-img { transform: scale(1.03) translateX(5px); }

        /* Nova classe gerida independentemente da slide para contornar o Stacking Context */
        .slide-overlay { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(transparent, rgba(0,0,0,0.85) 60%, rgba(0,0,0,0.95) 100%); 
            color: white; padding: 100px 50px 100px;
            z-index: 35;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 2.5s ease-in-out, transform 2s ease-out;
            display: flex; justify-content: space-between; align-items: flex-end; gap: 20px;
            pointer-events: none;
        }

        .slide-overlay.active { 
            opacity: 1;
            transform: translateY(0); 
        }

        .text-content { flex: 1; max-width: 65%; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }

        .slide-overlay p { font-family: 'Inter', sans-serif; font-size: 1.2em; opacity: 0.9; margin: 0 0 10px 0; font-weight: 400; letter-spacing: 4px; text-transform: uppercase; }
        .slide-overlay h1 { font-family: 'Playfair Display', serif; font-size: 4em; margin: 0 0 15px 0; font-weight: 600; line-height: 1.1; letter-spacing: -1px; }
        
        .price-row { display: flex; align-items: baseline; gap: 20px; flex-wrap: wrap; }
        .slide-overlay h2 { font-family: 'Playfair Display', serif; font-size: 3em; color: #eab308; margin: 0; font-weight: 600; }
        .old-price { font-family: 'Inter', sans-serif; font-size: 1.2em; text-decoration: line-through; opacity: 0.7; font-weight: 300; }
        
        .promo-tag {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: white;
            padding: 8px 15px; border-radius: 8px;
            font-family: 'Inter', sans-serif; font-size: 1.2em; font-weight: 600;
            backdrop-filter: blur(5px);
        }

        .qr-code-container {
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(10px);
            padding: 15px; border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            flex-shrink: 0; 
        }

        .qr-code-container img {
            width: 25vw; max-width: 140px; 
            height: auto; display: block;
            border-radius: 8px; mix-blend-mode: normal; 
            background: white; padding: 5px;
        }

        .legal-footer {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.85);
            color: rgba(255, 255, 255, 0.5);
            padding: 15px 50px;
            font-size: 0.75em;
            font-family: 'Inter', sans-serif;
            z-index: 100;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 0.5px;
        }

        #error-msg {
            color: white; text-align: center; padding-top: 20%; font-size: 2em; display: none; font-family: 'Playfair Display', serif;
        }
        #error-msg p { font-family: 'Inter', sans-serif; font-size: 0.5em; opacity: 0.7; font-weight: 300; }

        @media (max-width: 600px) {
            .slide-overlay { padding: 80px 30px 100px; flex-direction: column; align-items: flex-start; gap: 30px; }
            .text-content { max-width: 100%; }
            .slide-overlay h1 { font-size: 3em; }
            .slide-overlay h2 { font-size: 2.5em; }
            .qr-code-container { align-self: flex-end; }
            .qr-code-container img { max-width: 110px; }
        }
    </style>
</head>
<body>
    <div id="slider"></div>
    <div id="error-msg"><h1>Montra Indisponível</h1><p>Contacte o administrador da plataforma.</p></div>

    <div class="legal-footer">
        As imagens, descrições e preços apresentados são da inteira responsabilidade do anunciante. 
        A plataforma <b>Portugal Vision</b> não se responsabiliza por este conteúdo.
    </div>

    <script>
        const _sb = supabase.createClient("https://hhrmbrcaujfsqfanxqqq.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhocm1icmNhdWpmc3FmYW54cXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTA0NDIsImV4cCI6MjA4ODcyNjQ0Mn0.pPkvwcb4h8SjYyvAFt1dnJE6Xn8KDQ4TVcy-QiamLpk");
        let currentIndex = 0;
        let lastDataHash = "";
        let slideTimer = null;
        let baseQRUrl = "";

        document.body.addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e => console.log(e));
        });

        async function updateDigitalBox() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('loja');
            if (!slug) return;

            const orderLink = `https://portugal-vision.github.io/portugal-vision/website_digital.html?loja=${slug}`;
            baseQRUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(orderLink)}&margin=10`;

            const { data: loja, error: errorLoja } = await _sb.from('lojas').select('*').eq('slug', slug).single();
            
            if (!loja || loja.status !== 'ativa' || !loja.status_digital_box) {
                document.getElementById('slider').style.display = 'none';
                document.getElementById('error-msg').style.display = 'block';
                return;
            } else {
                document.getElementById('slider').style.display = 'block';
                document.getElementById('error-msg').style.display = 'none';
            }

            if (loja.tema_sazonal && loja.tema_sazonal !== 'nenhum' && !document.getElementById('seasonal-frame')) {
                const temaSazonal = loja.tema_sazonal.toLowerCase();
                const sufixo = window.innerWidth < 768 ? 'Mobile' : 'PC';
                const videoUrl = `https://hhrmbrcaujfsqfanxqqq.supabase.co/storage/v1/object/public/molduras/${temaSazonal}_${sufixo}.mp4`;
                const imageUrl = `https://hhrmbrcaujfsqfanxqqq.supabase.co/storage/v1/object/public/molduras/${temaSazonal}_${sufixo}.png`;

                const container = document.createElement('div');
                container.id = 'seasonal-frame';
                container.style.position = 'fixed';
                container.style.inset = '0';
                /* Alteração Crítica: z-index ajustado para 20 para ficar entre as imagens (10) e os overlays (30) */
                container.style.zIndex = '20'; 
                container.style.pointerEvents = 'none';
                container.style.overflow = 'hidden';

                const video = document.createElement('video');
                video.src = videoUrl;
                video.autoplay = true;
                video.loop = true;
                video.muted = true;
                video.playsInline = true;
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.objectFit = 'cover';
                
                video.onerror = () => {
                    container.style.background = `url('${imageUrl}') no-repeat center center`;
                    container.style.backgroundSize = 'cover';
                    video.style.display = 'none';
                };
                container.appendChild(video);
                document.body.appendChild(container);
            } else if ((!loja.tema_sazonal || loja.tema_sazonal === 'nenhum') && document.getElementById('seasonal-frame')) {
                 document.getElementById('seasonal-frame').remove();
            }

            const { data: produtos } = await _sb.from('produtos')
                .select('*')
                .eq('loja_id', loja.id)
                .eq('oculto', false);

            if (!produtos || produtos.length === 0) return;

            const currentDataHash = JSON.stringify(produtos);
            if (currentDataHash !== lastDataHash) {
                lastDataHash = currentDataHash;
                renderSlides(produtos, loja.nome);
            }
        }

        function renderSlides(produtos, nomeLoja) {
            const slider = document.getElementById('slider');
            
            /* Nova Estrutura: Contentor independente para overlays e textos */
            let overlaysContainer = document.getElementById('overlays');
            if (!overlaysContainer) {
                overlaysContainer = document.createElement('div');
                overlaysContainer.id = 'overlays';
                overlaysContainer.style.position = 'absolute';
                overlaysContainer.style.inset = '0';
                overlaysContainer.style.zIndex = '30'; /* Fica acima da moldura de vídeo */
                overlaysContainer.style.pointerEvents = 'none';
                document.body.appendChild(overlaysContainer);
            }

            const totalProdutos = produtos.length;
            if (currentIndex >= totalProdutos) currentIndex = 0;

            let slidesHTML = '';
            let overlaysHTML = '';

            produtos.forEach((p, i) => {
                const preco = parseFloat(p.preco) || 0;
                const desc = parseInt(p.desconto_percent) || 0;
                const final = desc > 0 ? (preco * (1 - desc / 100)).toFixed(2) : preco.toFixed(2);
                
                const imgSrc = p.imagem_url || 'https://via.placeholder.com/1920x1080?text=Portugal+Vision';
                const activeClass = i === currentIndex ? 'active' : '';

                // Apenas a imagem
                slidesHTML += `
                    <div class="slide ${activeClass}">
                        <img class="fg-img" src="${imgSrc}" onerror="this.src='https://via.placeholder.com/1920x1080?text=Portugal+Vision'">
                    </div>
                `;

                // Apenas os dados formatados
                overlaysHTML += `
                    <div class="slide-overlay ${activeClass}">
                        <div class="text-content">
                            <p>${nomeLoja}</p>
                            <h1>${p.nome}</h1>
                            <div class="price-row">
                                <h2>${final}€</h2>
                                ${desc > 0 ? `<span class="old-price">${preco.toFixed(2)}€</span> <span class="promo-tag">-${desc}%</span>` : ''}
                            </div>
                        </div>
                        
                        <div class="qr-code-container">
                            <img src="${baseQRUrl}" alt="QR Code">
                        </div>
                    </div>
                `;
            });

            slider.innerHTML = slidesHTML;
            overlaysContainer.innerHTML = overlaysHTML;
        }

        function nextSlide() {
            const slides = document.querySelectorAll('.slide');
            const overlays = document.querySelectorAll('.slide-overlay');
            
            if (slides.length > 1) {
                // Remove estado ativo
                slides[currentIndex].classList.remove('active');
                if(overlays[currentIndex]) overlays[currentIndex].classList.remove('active');
                
                currentIndex = (currentIndex + 1) % slides.length;
                
                // Adiciona estado ativo à imagem e ao texto de forma sincronizada
                slides[currentIndex].classList.add('active');
                if(overlays[currentIndex]) overlays[currentIndex].classList.add('active');
            }
        }

        updateDigitalBox();
        setInterval(nextSlide, 8000);
        setInterval(updateDigitalBox, 30000);
    </script>
</body>
</html>

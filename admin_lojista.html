<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Lojista | Portugal Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --primary-light: #1e293b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --bg: #f8fafc;
            --white: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* --- AUTH SCREEN --- */
        #auth-container {
            position: fixed;
            inset: 0;
            background: var(--primary);
            background: radial-gradient(circle at top right, var(--primary-light), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .auth-card {
            background: var(--white);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
        }

        .auth-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .auth-card h2 { margin-bottom: 2rem; font-weight: 700; color: var(--primary); }

        /* --- NAVIGATION --- */
        nav {
            background: var(--primary);
            color: var(--white);
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -0.5px;
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* --- MAIN LAYOUT --- */
        main {
            max-width: 1280px;
            margin: 2.5rem auto;
            padding: 0 1.5rem;
            display: none;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 3rem;
        }

        .header-info h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -1px;
        }

        /* --- PRODUCT GRID --- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--white);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent);
        }

        .product-img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            background: #f1f5f9;
        }

        .card-body {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .category-tag {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .product-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--primary);
        }

        .price-wrapper {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .current-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        .old-price {
            text-decoration: line-through;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* --- BUTTONS --- */
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            font-family: inherit;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }

        .btn-secondary { background: var(--white); color: var(--primary); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--bg); border-color: var(--text-muted); }

        .btn-danger { background: #fee2e2; color: var(--danger); }
        .btn-danger:hover { background: #fecaca; }

        .card-actions {
            display: grid;
            grid-template-columns: 1fr 50px;
            gap: 10px;
            margin-top: auto;
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 1rem;
        }

        .modal-container {
            background: var(--white);
            width: 100%;
            max-width: 650px;
            border-radius: 28px;
            padding: 2.5rem;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        /* --- FORMS --- */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group { margin-bottom: 1.5rem; }
        .full-width { grid-column: span 2; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        input, select, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        /* --- PREVIEW IMAGE --- */
        #img-drop-area {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 1rem;
        }

        #img-drop-area:hover { border-color: var(--accent); background: #f0f7ff; }

        #preview-img-box {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            margin-top: 1rem;
            display: none;
        }

        /* --- LOADER --- */
        .loader-spin {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- BADGES --- */
        .badge-status {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: var(--shadow);
        }

        .status-on { background: #dcfce7; color: #166534; }
        .status-off { background: #f1f5f9; color: #475569; }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 1.5rem; }
        }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-card">
        <div class="auth-logo">PORTUGAL VISION</div>
        <h2>Acesso Lojista</h2>
        <div class="form-group" style="text-align:left">
            <label>Email da Conta</label>
            <input type="email" id="login-email" placeholder="ex: contacto@loja.pt">
        </div>
        <div class="form-group" style="text-align:left">
            <label>Palavra-passe</label>
            <input type="password" id="login-pass" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" style="width:100%; margin-top:1rem;" onclick="handleLogin()">
            ENTRAR NO PAINEL
        </button>
    </div>
</div>

<nav>
    <div class="nav-brand">
        <i class="fas fa-store"></i>
        PORTUGAL VISION <span style="font-weight:300; opacity:0.6;">| LOJISTA</span>
    </div>
    <div class="nav-user">
        <span id="loja-name-display" style="font-weight:600; font-size:0.9rem;">---</span>
        <button class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size:0.8rem;" onclick="handleLogout()">SAIR</button>
    </div>
</nav>

<main id="main-panel">
    <div class="page-header">
        <div class="header-info">
            <h1>Gestão de Produtos</h1>
            <p style="color:var(--text-muted)">Controle o seu catálogo digital em tempo real</p>
        </div>
        <button class="btn btn-primary" onclick="openProductModal()">
            <i class="fas fa-plus"></i> ADICIONAR NOVO PRODUTO
        </button>
    </div>

    <div class="products-grid" id="products-list">
        </div>
</main>

<div class="modal-overlay" id="productModal">
    <div class="modal-container">
        <h2 id="modal-title" style="margin-bottom:2rem; font-size:1.5rem; letter-spacing:-0.5px;">Novo Produto</h2>
        <form id="productForm">
            <input type="hidden" id="edit-id">
            
            <div id="img-drop-area" onclick="document.getElementById('file-input').click()">
                <i class="fas fa-cloud-upload-alt" style="font-size:2rem; color:var(--accent); margin-bottom:1rem;"></i>
                <p style="font-size:0.9rem; font-weight:600;">Clique para carregar foto do produto</p>
                <p style="font-size:0.75rem; color:var(--text-muted)">JPG, PNG ou WebP (Máx. 5MB)</p>
                <input type="file" id="file-input" hidden accept="image/*" onchange="previewFile(this)">
                <div id="preview-img-box"></div>
            </div>

            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Nome do Produto</label>
                    <input type="text" id="p-nome" required placeholder="Ex: Relógio Digital Sports">
                </div>
                
                <div class="form-group">
                    <label>Preço (€)</label>
                    <input type="number" id="p-preco" step="0.01" required placeholder="0.00">
                </div>
                
                <div class="form-group">
                    <label>Desconto (%)</label>
                    <input type="number" id="p-desc" value="0" min="0" max="99">
                </div>

                <div class="form-group">
                    <label>Categoria</label>
                    <select id="p-cat">
                        <option value="Geral">Geral</option>
                        <option value="Novidades">Novidades</option>
                        <option value="Promoções">Promoções</option>
                        <option value="Stock Off">Stock Off</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Visibilidade</label>
                    <select id="p-oculto">
                        <option value="false">Visível no Catálogo</option>
                        <option value="true">Ocultar Produto</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label>Descrição Curta (Opcional)</label>
                    <textarea id="p-desc-text" rows="3" placeholder="Detalhes que ajudam a vender..."></textarea>
                </div>
            </div>

            <div style="display:flex; gap:12px; margin-top:2rem;">
                <button type="button" class="btn btn-secondary" style="flex:1" onclick="closeProductModal()">CANCELAR</button>
                <button type="submit" class="btn btn-primary" style="flex:2" id="btn-save">
                    <div class="loader-spin" id="save-loader"></div>
                    <span id="save-text">GUARDAR PRODUTO</span>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // --- CONFIGURAÇÃO SUPABASE ---
    const SB_URL = "https://hhrmbrcaujfsqfanxqqq.supabase.co";
    const SB_KEY = "SUA_KEY_AQUI"; // Inserir a Key Anonima
    const _sb = supabase.createClient(SB_URL, SB_KEY);

    let currentLoja = null;
    let productsData = [];

    // --- AUTENTICAÇÃO ---
    async function handleLogin() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        const { data, error } = await _sb.auth.signInWithPassword({ email, password: pass });
        if(error) alert("Erro: " + error.message); else checkSession();
    }

    async function checkSession() {
        const { data: { session } } = await _sb.auth.getSession();
        if(session) {
            const { data: loja } = await _sb.from('lojas').select('*').eq('email_dono', session.user.email).single();
            if(loja) {
                currentLoja = loja;
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('main-panel').style.display = 'block';
                document.getElementById('loja-name-display').innerText = loja.nome;
                loadProducts();
            } else {
                alert("Utilizador sem loja vinculada.");
                handleLogout();
            }
        }
    }

    // --- GESTÃO DE PRODUTOS ---
    async function loadProducts() {
        const { data, error } = await _sb.from('produtos').select('*').eq('loja_id', currentLoja.id).order('created_at', {ascending: false});
        if(!error) {
            productsData = data;
            renderProducts();
        }
    }

    function renderProducts() {
        const list = document.getElementById('products-list');
        list.innerHTML = productsData.map(p => {
            const final = p.desconto_percent > 0 ? (p.preco * (1 - p.desconto_percent/100)).toFixed(2) : p.preco.toFixed(2);
            return `
                <div class="product-card">
                    <div class="badge-status ${p.oculto ? 'status-off' : 'status-on'}">${p.oculto ? 'Oculto' : 'Ativo'}</div>
                    <img src="${p.imagem_url || 'https://via.placeholder.com/400x300'}" class="product-img">
                    <div class="card-body">
                        <div class="category-tag">${p.categoria || 'Geral'}</div>
                        <div class="product-name">${p.nome}</div>
                        <div class="price-wrapper">
                            <div class="current-price">${final}€</div>
                            ${p.desconto_percent > 0 ? `<div class="old-price">${p.preco.toFixed(2)}€</div>` : ''}
                        </div>
                        <div class="card-actions">
                            <button class="btn btn-secondary" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i> EDITAR</button>
                            <button class="btn btn-danger" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // --- FORMULÁRIO E IMAGEM ---
    let tempImgFile = null;

    function previewFile(input) {
        if (input.files && input.files[0]) {
            tempImgFile = input.files[0];
            const reader = new FileReader();
            reader.onload = e => {
                const box = document.getElementById('preview-img-box');
                box.style.display = 'block';
                box.style.backgroundImage = `url(${e.target.result})`;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    document.getElementById('productForm').onsubmit = async (e) => {
        e.preventDefault();
        const saveBtn = document.getElementById('btn-save');
        const loader = document.getElementById('save-loader');
        const text = document.getElementById('save-text');

        saveBtn.disabled = true;
        loader.style.display = 'block';
        text.innerText = "A GUARDAR...";

        let imgUrl = document.getElementById('preview-img-box').dataset.url || "";

        // Upload se houver nova imagem
        if (tempImgFile) {
            const ext = tempImgFile.name.split('.').pop();
            const path = `${currentLoja.id}/${Date.now()}.${ext}`;
            const { data: upData, error: upErr } = await _sb.storage.from('produtos-imgs').upload(path, tempImgFile);
            if(!upErr) {
                const { data: pub } = _sb.storage.from('produtos-imgs').getPublicUrl(path);
                imgUrl = pub.publicUrl;
            }
        }

        const payload = {
            loja_id: currentLoja.id,
            nome: document.getElementById('p-nome').value,
            preco: parseFloat(document.getElementById('p-preco').value),
            desconto_percent: parseInt(document.getElementById('p-desc').value),
            categoria: document.getElementById('p-cat').value,
            oculto: document.getElementById('p-oculto').value === "true",
            descricao: document.getElementById('p-desc-text').value,
            imagem_url: imgUrl
        };

        const id = document.getElementById('edit-id').value;
        const { error } = id 
            ? await _sb.from('produtos').update(payload).eq('id', id)
            : await _sb.from('produtos').insert([payload]);

        if (error) alert("Erro ao guardar: " + error.message);
        else {
            closeProductModal();
            loadProducts();
        }

        saveBtn.disabled = false;
        loader.style.display = 'none';
        text.innerText = "GUARDAR PRODUTO";
    };

    // --- UTILITÁRIOS ---
    function openProductModal() {
        document.getElementById('productForm').reset();
        document.getElementById('edit-id').value = "";
        document.getElementById('preview-img-box').style.display = 'none';
        document.getElementById('preview-img-box').dataset.url = "";
        document.getElementById('modal-title').innerText = "Novo Produto";
        document.getElementById('productModal').style.display = 'flex';
        tempImgFile = null;
    }

    function closeProductModal() {
        document.getElementById('productModal').style.display = 'none';
    }

    function editProduct(id) {
        const p = productsData.find(x => x.id === id);
        if(!p) return;

        openProductModal();
        document.getElementById('modal-title').innerText = "Editar Produto";
        document.getElementById('edit-id').value = p.id;
        document.getElementById('p-nome').value = p.nome;
        document.getElementById('p-preco').value = p.preco;
        document.getElementById('p-desc').value = p.desconto_percent || 0;
        document.getElementById('p-cat').value = p.categoria || "Geral";
        document.getElementById('p-oculto').value = p.oculto.toString();
        document.getElementById('p-desc-text').value = p.descricao || "";
        
        if(p.imagem_url) {
            const box = document.getElementById('preview-img-box');
            box.style.display = 'block';
            box.style.backgroundImage = `url(${p.imagem_url})`;
            box.dataset.url = p.imagem_url;
        }
    }

    async function deleteProduct(id) {
        if(confirm("Deseja eliminar este produto permanentemente?")) {
            await _sb.from('produtos').delete().eq('id', id);
            loadProducts();
        }
    }

    function handleLogout() {
        _sb.auth.signOut().then(() => location.reload());
    }

    // Inicialização
    checkSession();

</script>
</body>
</html>

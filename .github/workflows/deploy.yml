name: Deploy para Supabase
on:
  push:
    branches: [ main ]
    paths: [ 'supabase/functions/**' ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: supabase/setup-cli@v1
      - name: Enviar Funcao
        run: supabase functions deploy whatsapp-notificacao --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
